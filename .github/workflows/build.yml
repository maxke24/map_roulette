name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      # No server URLs or Cloudflare Access credentials are built in. They would
      # end up as plain strings in BuildConfig, and this APK is published to a
      # public release — anyone could unzip it and read them. The app takes all
      # four values at runtime under Settings → Server.
      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk map-roulette.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: map-roulette-apk
          path: map-roulette.apk

      - name: Update "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          prerelease: true
          files: map-roulette.apk
          body: |
            Automatic build of the newest commit on main.
            Download `map-roulette.apk` below and install it on your phone
            (allow installs from unknown sources).

            This build ships with no server configured. Point it at your own
            under Settings → Server; see `server/INSTALL.md` to host one.
