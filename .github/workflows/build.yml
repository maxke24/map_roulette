name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug
        env:
          ROUTING_SERVER_URL: ${{ secrets.ROUTING_SERVER_URL }}
          ROUTING_CF_ID: ${{ secrets.ROUTING_CF_ID }}
          ROUTING_CF_SECRET: ${{ secrets.ROUTING_CF_SECRET }}

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk map-roulette.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: map-roulette-apk
          path: map-roulette.apk

      - name: Update "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          prerelease: true
          files: map-roulette.apk
          body: |
            Automatic build of the newest commit on main.
            Download `map-roulette.apk` below and install it on your phone
            (allow installs from unknown sources).
